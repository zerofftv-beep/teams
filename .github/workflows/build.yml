name: Build Minecraft Mods

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable (sbw-teams)
        run: |
          if [ -f "sbw-teams/gradlew" ]; then
            chmod +x sbw-teams/gradlew
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
          fi

      - name: Build SBW Teams
        working-directory: sbw-teams
        run: ./gradlew build --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbw-teams
          path: sbw-teams/build/libs/*.jar
