name: Build Minecraft Mods

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x */gradlew

      - name: Build Multiplayer Addon
        working-directory: superbwarfare-multiplayer-addon
        run: ./gradlew build

      - name: Build SBW Teams
        working-directory: sbw-teams
        run: ./gradlew build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-mods
          path: |
            superbwarfare-multiplayer-addon/build/libs/*.jar
            sbw-teams/build/libs/*.jar
